<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IEEE SB VJEC | Official Launch</title>
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&family=Plus+Jakarta+Sans:ital,wght@0,200;0,400;0,700;1,800&family=Syne:wght@400;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #0084ff;
            --primary-glow: rgba(0, 132, 255, 0.5);
            --ieee-blue: #00629B;
            --background: #020617;
            --accent-gold: #77e480;
            /* Vivid Gold */
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: default;
        }

        body,
        html {
            height: 100%;
            width: 100%;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--background);
            color: #fff;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- Cyber Grid Background --- */
        .bg-overlay {
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                radial-gradient(circle at 50% 50%, rgba(0, 98, 155, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(0, 132, 255, 0.1) 0%, transparent 30%);
        }

        .grid-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            perspective: 1000px;
            overflow: hidden;
        }

        .grid {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image:
                linear-gradient(rgba(0, 132, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90(deg, rgba(0, 132, 255, 0.1) 1px, transparent 1px));
            background-size: 50px 50px;
            transform: rotateX(60deg);
            animation: grid-move 20s linear infinite;
        }

        @keyframes grid-move {
            0% {
                transform: rotateX(60deg) translateY(0);
            }

            100% {
                transform: rotateX(60deg) translateY(50px);
            }
        }

        canvas#particle-canvas {
            position: fixed;
            inset: 0;
            z-index: -1;
        }

        /* --- Main Container --- */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            padding: 2rem;
            text-align: center;
        }

        /* --- Stage 1 - Hero Section --- */
        #stage-1 {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 1.5s ease-out;
        }

        .badge {
            background: rgba(119, 228, 128, 0.1);
            border: 1px solid rgba(119, 228, 128, 0.3);
            padding: 10px 24px;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #77e480;
            margin-bottom: 2.5rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(119, 228, 128, 0.1);
            animation: pulse-border 2s infinite, fadeInUp 0.8s ease-out;
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(3.5rem, 10vw, 7rem);
            font-weight: 800;
            line-height: 1;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            background: linear-gradient(
                to right, 
                #fff 20%, 
                #0084ff 40%, 
                #818cf8 60%, 
                #fff 80%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite, fadeInUp 1s ease-out 0.2s backwards;
            filter: drop-shadow(0 0 30px rgba(0, 132, 255, 0.3));
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .college-name {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: clamp(0.9rem, 1.5vw, 1.2rem);
            font-weight: 700;
            color: #94a3b8;
            margin-bottom: 5rem;
            letter-spacing: 12px;
            text-transform: uppercase;
            opacity: 0.8;
            animation: fadeInUp 1s ease-out 0.4s backwards;
        }

        /* Premium Floating Button */
        .launch-trigger {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 24px 60px;
            font-size: 1.4rem;
            font-weight: 600;
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            animation: fadeInUp 1s ease-out 0.6s backwards;
        }

        .launch-trigger::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.15), transparent);
            transform: translateX(-100%);
            transition: 0.6s;
        }

        .launch-trigger:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--primary);
            background: rgba(0, 132, 255, 0.1);
            box-shadow: 0 30px 60px rgba(0, 132, 255, 0.2), 0 0 20px rgba(0, 132, 255, 0.1);
            color: #fff;
        }

        .launch-trigger:hover::before {
            transform: translateX(100%);
        }

        /* Stage 2 Styles RE-INSTATED */
        #stage-2 {
            display: none;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transform: translateY(30px) scale(0.95);
            transition: all 1s cubic-bezier(0.23, 1, 0.32, 1);
        }

        #stage-2.active {
            display: flex;
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .mockup-wrap {
            position: relative;
            width: 100%;
            max-width: 900px;
            padding: 20px;
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(40px);
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
        }

        .browser-top {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 8px;
            margin-bottom: 20px;
            padding-left: 10px;
        }

        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .red { background: #ff5f57; }
        .yellow { background: #febc2e; }
        .green { background: #28c840; }

        .url-bar {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 18px 30px;
            display: flex;
            align-items: center;
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 500;
            color: var(--primary);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        .protocol { color: #475569; margin-right: 4px; }
        
        .cursor {
            display: inline-block;
            width: 3px;
            height: 1.5rem;
            background: var(--accent-gold);
            margin-left: 4px;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        .loader-line {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary), var(--accent-gold));
            width: 0%;
            transition: width 0.1s linear;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes blink { 50% { opacity: 0; } }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(119, 228, 128, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(119, 228, 128, 0); }
            100% { box-shadow: 0 0 0 0 rgba(119, 228, 128, 0); }
        }

        .status-msg {
            margin-top: 2rem;
            font-size: 1.2rem;
            color: #94a3b8;
            opacity: 0;
            transform: translateY(10px);
            transition: 0.5s;
        }

        .status-msg.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>

<body>

    <div class="grid-container">
        <div class="grid"></div>
    </div>
    <div class="bg-overlay"></div>
    <canvas id="particle-canvas"></canvas>

    <div class="container">
        <!-- Stage 1 -->
        <div id="stage-1">
            <div class="badge">Official Digital Launch</div>
            <h1>IEEE SB VJEC</h1>
            <p class="college-name">Vimal Jyothi Engineering College</p>
            <button class="launch-trigger" id="btn-launch">
                Launch the Website
                <div class="btn-overlay"></div>
            </button>
        </div>

        <!-- Stage 2 -->
        <div id="stage-2">
            <div class="badge">Processing Secure Request</div>
            <div class="mockup-wrap">
                <div class="browser-top">
                    <div class="dot red"></div>
                    <div class="dot yellow"></div>
                    <div class="dot green"></div>
                </div>
                <div class="url-bar">
                    <span class="protocol">https://</span>
                    <span id="typing-target"></span>
                    <span class="cursor"></span>
                </div>
                <div class="loader-line" id="progress"></div>
            </div>
            <p class="status-msg" id="status">Connecting to server...</p>
        </div>
    </div>

    <script>
        // --- Canvas Particles ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 120; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 1,
                    speedX: (Math.random() - 0.5) * 0.5,
                    speedY: (Math.random() - 0.5) * 0.5,
                    o: Math.random() * 0.5 + 0.2
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                ctx.fillStyle = `rgba(255, 255, 255, ${p.o})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                p.x += p.speedX; p.y += p.speedY;
                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;
            });
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init();
        draw();

        // --- Core Logic ---
        const btn = document.getElementById('btn-launch');
        const stage1 = document.getElementById('stage-1');
        const stage2 = document.getElementById('stage-2');
        const typingText = document.getElementById('typing-target');
        const progressBar = document.getElementById('progress');
        const statusMsg = document.getElementById('status');

        const url = "ieeesbvjec.in";
        const targetUrl = "https://ieeesbvjec.in";

        btn.addEventListener('click', () => {
            // Elegant Transition Out
            stage1.style.transition = 'all 1.2s cubic-bezier(0.19, 1, 0.22, 1)';
            stage1.style.transform = 'translateY(-100px)';
            stage1.style.opacity = '0';

            setTimeout(() => {
                stage1.style.display = 'none';
                stage2.classList.add('active');

                // Start sequence
                setTimeout(startTyping, 1000);
            }, 800);
        });

        function startTyping() {
            let i = 0;
            statusMsg.classList.add('show');

            const typingInterval = setInterval(() => {
                if (i < url.length) {
                    typingText.textContent += url[i];
                    i++;
                    // Progress bar matches typing
                    progressBar.style.width = (i / url.length) * 100 + '%';
                } else {
                    clearInterval(typingInterval);
                    completeSequence();
                }
            }, 100);
        }

        function completeSequence() {
            statusMsg.textContent = "Secure connection established. Entering Site...";
            statusMsg.style.color = "#28c840";

            setTimeout(() => {
                // Final reveal scale up effect before redirect
                stage2.style.transform = 'scale(1.05)';
                stage2.style.opacity = '0';

                setTimeout(() => {
                    window.location.href = targetUrl;
                }, 800);
            }, 1800);
        }

        // Mouse follower effect on body for grid depth
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            document.querySelector('.grid').style.transform = `rotateX(60deg) translate(${moveX}px, ${moveY}px)`;
        });

    </script>
</body>

</html>
